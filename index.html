// --- COMPANY SWIPE CARD ------------------------------------------------------
function CompanySwipeCard({ co, onSwipe, isTop }) {
  const [dragX, setDragX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [tab, setTab] = useState("story");
  const startX = useRef(0);

  const down = x => { setDragging(true); startX.current = x; };
  const move = x => { if (dragging) setDragX(x - startX.current); };
  const up = () => {
    if (!dragging) return;
    setDragging(false);
    if (dragX > 80) onSwipe("right");
    else if (dragX < -80) onSwipe("left");
    else setDragX(0);
  };

  return (
    <div
      onMouseDown={e=>down(e.clientX)} onMouseMove={e=>move(e.clientX)} onMouseUp={up} onMouseLeave={up}
      onTouchStart={e=>down(e.touches[0].clientX)} onTouchMove={e=>move(e.touches[0].clientX)} onTouchEnd={up}
      style={{
        position:"absolute", width:"100%", height:"100%",
        transform:`translateX(${isTop?dragX:0}px) rotate(${isTop?dragX*.03:0}deg) scale(${isTop?1:.97})`,
        transition: dragging ? "none" : "transform .3s cubic-bezier(.34,1.56,.64,1)",
        opacity: isTop ? 1 : .88, cursor: isTop ? "grab" : "default",
        userSelect:"none", zIndex: isTop ? 10 : 5,
      }}
    >
      {/* Swipe labels */}
      {isTop && dragX > 40 && (
        <div style={{ position:"absolute", top:28, left:20, zIndex:20, border:`2px solid ${C.teal}`, color:C.teal, padding:"4px 14px", borderRadius:2, ...T.label, fontSize:13, letterSpacing:"0.1em", opacity:Math.min(dragX/80,1), background:C.white }}>INTERESTED</div>
      )}
      {isTop && dragX < -40 && (
        <div style={{ position:"absolute", top:28, right:20, zIndex:20, border:`2px solid ${C.error}`, color:C.error, padding:"4px 14px", borderRadius:2, ...T.label, fontSize:13, letterSpacing:"0.1em", opacity:Math.min(-dragX/80,1), background:C.white }}>PASS</div>
      )}

      <div style={{ width:"100%", height:"100%", borderRadius:0, background:C.white, boxShadow:"0 4px 40px rgba(0,0,0,.12)", overflow:"hidden", display:"flex", flexDirection:"column" }}>
        {/* Magazine-cover header -- the signature moment */}
        <div style={{ background:co.bg, padding:"32px 24px 24px", flexShrink:0, position:"relative", minHeight:200, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
          <div style={{ ...T.label, fontSize:10, color:"rgba(255,255,255,.45)", marginBottom:10 }}>{co.type.toUpperCase()} . {co.location.toUpperCase()}</div>
          <div style={{ ...T.display, fontSize:38, color:C.white, marginBottom:8, lineHeight:.95 }}>{co.name}</div>
          <div style={{ display:"flex", gap:10, alignItems:"center" }}>
            <div style={{ ...T.label, fontSize:10, color:"rgba(255,255,255,.5)" }}>{co.remote.toUpperCase()}</div>
            <div style={{ width:3, height:3, borderRadius:"50%", background:"rgba(255,255,255,.3)" }} />
            <div style={{ ...T.label, fontSize:10, color:"rgba(255,255,255,.5)" }}>{co.size} PEOPLE</div>
            <div style={{ width:3, height:3, borderRadius:"50%", background:"rgba(255,255,255,.3)" }} />
            <div style={{ ...T.label, fontSize:10, color:"rgba(255,255,255,.5)" }}>EST. {co.founded}</div>
          </div>
          {/* Hiring tags */}
          <div style={{ display:"flex", gap:6, marginTop:14, flexWrap:"wrap" }}>
            {co.hiring.map(r => (
              <div key={r} style={{ border:"1px solid rgba(255,255,255,.25)", color:"rgba(255,255,255,.8)", padding:"4px 10px", borderRadius:1, ...T.label, fontSize:9 }}>
                {r.toUpperCase()}
              </div>
            ))}
          </div>
        </div>

        {/* Tab strip */}
        <div style={{ display:"flex", borderBottom:`1px solid ${C.rule}`, background:C.white, flexShrink:0 }}>
          {[{id:"story",label:"Story"},{id:"comp",label:"Comp"},{id:"pulse",label:"Pulse"}].map(t => (
            <button key={t.id} onClick={e=>{e.stopPropagation();setTab(t.id);}} style={{
              flex:1, padding:"11px 4px", background:"none", border:"none", cursor:"pointer",
              ...T.label, fontSize:10,
              color: tab===t.id ? C.ink : C.muted,
              borderBottom: tab===t.id ? `2px solid ${C.coral}` : "2px solid transparent",
            }}>{t.label}</button>
          ))}
        </div>

        {/* Tab content */}
        <div style={{ flex:1, overflowY:"auto", padding:"20px 24px", display:"flex", flexDirection:"column", gap:20 }}>

          {tab==="story" && <>
            {/* Reviews */}
            <div>
              <Lbl>Client Reviews</Lbl>
              <Stars rating={co.google} count={co.googleCount} source="Google" />
              <div style={{ height:8 }} />
              <Stars rating={co.exp}    count={co.expCount}    source="Experience.com" />
              <div style={{ marginTop:12, paddingTop:12, borderTop:`1px solid ${C.rule}` }}>
                <p style={{ ...T.body, fontSize:13, color:C.body, fontStyle:"italic", margin:0 }}>"{co.topReview}"</p>
              </div>
            </div>
            <Rule />
            {/* Stats row */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16 }}>
              {[["Volume",co.volume],["Comp",co.comp],["Style",co.remote]].map(([l,v]) => (
                <div key={l}>
                  <Lbl>{l}</Lbl>
                  <div style={{ ...T.subhead, fontSize:13, color:C.ink }}>{v}</div>
                </div>
              ))}
            </div>
            <Rule />
            {/* Culture */}
            <div>
              <Lbl>Culture</Lbl>
              <p style={{ ...T.body, fontSize:13, color:C.body, margin:0 }}>{co.culture}</p>
            </div>
          </>}

          {tab==="comp" && <>
            {/* AI rewrite */}
            <div style={{ background:co.bg, padding:"20px", marginLeft:-24, marginRight:-24, marginTop:-20 }}>
              <div style={{ ...T.label, fontSize:9, color:"rgba(255,255,255,.4)", marginBottom:10 }}>AI COMP SUMMARY</div>
              <p style={{ ...T.body, fontSize:14, color:C.white, margin:0, lineHeight:1.7 }}>{co.aiComp}</p>
            </div>
            <div>
              <Lbl>Compensation</Lbl>
              <div style={{ ...T.subhead, fontSize:16, color:C.ink }}>{co.comp}</div>
            </div>
            <Rule />
            <div>
              <Lbl>Volume</Lbl>
              <div style={{ ...T.subhead, fontSize:16, color:C.ink }}>{co.volume}</div>
            </div>
            <Rule />
            <p style={{ ...T.caption, fontSize:12, color:C.muted, margin:0 }}>Full comp agreement shared after a mutual match.</p>
          </>}

          {tab==="pulse" && <>
            <div>
              <Lbl>AI Social Pulse -- Last 90 days</Lbl>
              <p style={{ ...T.caption, fontSize:12, color:C.muted, marginBottom:16 }}>Scanned from their LinkedIn, Instagram, and social profiles.</p>
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {co.socialPulse.map((post,i) => (
                  <div key={i} style={{ paddingLeft:14, borderLeft:`2px solid ${i===0?C.coral:C.rule}` }}>
                    <p style={{ ...T.body, fontSize:13, color:C.body, margin:0 }}>{post}</p>
                  </div>
                ))}
              </div>
            </div>
            <Rule />
            <div>
              <Lbl>Profiles</Lbl>
              <div style={{ display:"flex", gap:16 }}>
                {Object.entries(co.socials).map(([k,v]) => (
                  <div key={k}>
                    <div style={{ ...T.label, fontSize:9, color:C.muted }}>{k.toUpperCase()}</div>
                    <div style={{ ...T.body, fontSize:13, color:C.coral }}>@{v}</div>
                  </div>
                ))}
              </div>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

function CandidateSwipeCard({ candidate, onSwipe, isTop }) {
  const [dragX, setDragX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const startX = useRef(0);
  const down = x => { setDragging(true); startX.current = x; };
  const move = x => { if (dragging) setDragX(x - startX.current); };
  const up = () => {
    if (!dragging) return;
    setDragging(false);
    if (dragX > 80) onSwipe("right", candidate);
    else if (dragX < -80) onSwipe("left", candidate);
    else setDragX(0);
  };

  return (
    <div
      onMouseDown={e=>down(e.clientX)} onMouseMove={e=>move(e.clientX)} onMouseUp={up} onMouseLeave={up}
      onTouchStart={e=>down(e.touches[0].clientX)} onTouchMove={e=>move(e.touches[0].clientX)} onTouchEnd={up}
      style={{
        position:"absolute", width:"100%", height:"100%",
        transform:`translateX(${isTop?dragX:0}px) rotate(${isTop?dragX*.03:0}deg) scale(${isTop?1:.97})`,
        transition: dragging?"none":"transform .3s cubic-bezier(.34,1.56,.64,1)",
        opacity:isTop?1:.88, cursor:isTop?"grab":"default", userSelect:"none", zIndex:isTop?10:5,
      }}

// --- CHAT --------------------------------------------------------------------
function ChatScreen({ party, onBack, onSchedule, isCompany }) {
  const [messages, setMessages] = useState(MOCK_MSGS);
  const [input, setInput] = useState("");
  const bottomRef = useRef();
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);
  const send = () => { if (!input.trim()) return; setMessages(m => [...m, { from:"me", text:input.trim(), time:"Now" }]); setInput(""); };
  const name = isCompany ? party.alias : party.name;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", maxWidth:390, margin:"0 auto", background:C.ground }}>
      <div style={{ background:C.white, padding:"52px 24px 16px", display:"flex", alignItems:"center", gap:16, borderBottom:`1px solid ${C.rule}` }}>
        <button onClick={onBack} style={{ background:"none", border:"none", cursor:"pointer", color:C.coral, padding:0, ...T.body, fontSize:20, lineHeight:1 }}>{'<-'}</button>
        <div style={{ flex:1 }}>
          <div style={{ ...T.heading, fontSize:15, color:C.ink }}>{name}</div>
          <div style={{ ...T.label, fontSize:10, color:C.teal, marginTop:2 }}>Online now</div>
        </div>
        <button onClick={() => onSchedule(party)} style={{ background:"none", border:`1px solid ${C.rule}`, borderRadius:2, padding:"8px 14px", cursor:"pointer", ...T.label, fontSize:10, color:C.ink }}>Schedule</button>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"24px 20px", display:"flex", flexDirection:"column", gap:14 }}>
        <div style={{ textAlign:"center", ...T.label, fontSize:10, color:C.muted, marginBottom:4 }}>Today -- Matched with {name}</div>
        {messages.map((msg, i) => (
          <div key={i} style={{ display:"flex", justifyContent: msg.from==="me" ? "flex-end" : "flex-start" }}>
            <div style={{ maxWidth:"78%" }}>
              <div style={{
                padding:"12px 16px",
                background: msg.from==="me" ? C.coral : C.white,
                color: msg.from==="me" ? C.white : C.ink,
                borderRadius: msg.from==="me" ? "16px 16px 2px 16px" : "16px 16px 16px 2px",
                ...T.body, fontSize:14, lineHeight:1.5,
                boxShadow: msg.from==="me" ? "none" : "0 1px 8px rgba(0,0,0,.06)",
              }}>{msg.text}</div>
              <div style={{ ...T.caption, fontSize:10, color:C.muted, marginTop:4, textAlign: msg.from==="me"?"right":"left" }}>{msg.time}</div>
            </div>
          </div>
        ))}
        <div ref={bottomRef} />
      </div>

      <div style={{ padding:"12px 20px 32px", background:C.white, borderTop:`1px solid ${C.rule}`, display:"flex", gap:12, alignItems:"flex-end" }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message..."
          style={{ flex:1, padding:"12px 0", background:"transparent", border:"none", borderBottom:`1px solid ${C.rule}`, ...T.body, fontSize:14, color:C.ink, outline:"none" }} />
        <button onClick={send} disabled={!input.trim()} style={{ width:40, height:40, borderRadius:"50%", background:input.trim()?C.coral:C.rule, border:"none", cursor:input.trim()?"pointer":"default", color:C.white, fontSize:16, flexShrink:0, transition:"background .2s" }}>^</button>
      </div>
    </div>
  );
}

            <div style={{ ...T.label,fontSize:10,color:C.muted,marginBottom:4 }}>{tier.price?"14-Day Free Trial":"Free Plan"}</div>
            <div style={{ ...T.heading,fontSize:20,color:C.ink }}>{tier.name}</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ ...T.display,fontSize:28,color:C.ink }}>{tier.label}</div>
            <div style={{ ...T.label,fontSize:9,color:C.muted }}>{tier.sub.toUpperCase()}</div>
          </div>
        </div>

        {tier.price && (
          <div style={{ padding:"12px 14px",background:C.groundAlt,borderLeft:`3px solid ${C.coral}`,marginBottom:24 }}>
            <div style={{ ...T.body,fontSize:13,color:C.body }}>No charge today. Your card won't be billed until your 14-day trial ends.</div>
          </div>

        {tier.id==="free" ? (

                <div><Lbl>Expiry</Lbl><Input value={exp} onChange={e=>{let v=e.target.value.replace(/\D/g,"");if(v.length>=2)v=v.slice(0,2)+"/"+v.slice(2,4);setExp(v);}} placeholder="MM / YY"/></div>

            <PrimaryBtn onClick={pay} disabled={processing||card.replace(/\s/g,"").length<16||exp.length<5||cvv.length<3}>
              {processing ? "Processing..." : `Start trial -- ${tier.label}/mo after`}

}

        <PrimaryBtn onClick={()=>setScreen("swipe")}>Start discovering {'->'}</PrimaryBtn>
      </div>
    </div>
  );
}

      <div style={{ ...T.display, fontSize:30, color:C.ink, marginBottom:32, lineHeight:1 }}>Tell your<br/>story.</div>
      <div style={{ display:"flex", flexDirection:"column", gap:28 }}>

          <Lbl>Company type</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:4 }}>

              <button key={t} onClick={()=>setForm(f=>({...f,type:t}))} style={{ padding:"8px 14px", background:"transparent", border:`1px solid ${form.type===t?C.ink:C.rule}`, borderRadius:2, cursor:"pointer", ...T.label, fontSize:10, color:form.type===t?C.ink:C.muted }}>
                {t}
              </button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>Work style</Lbl>
          <div style={{ display:"flex", gap:8, marginTop:4 }}>
            {["Remote","Hybrid","In-office"].map(t => (
              <button key={t} onClick={()=>setForm(f=>({...f,remote:t}))} style={{ flex:1, padding:"10px", background:"transparent", border:`1px solid ${form.remote===t?C.ink:C.rule}`, borderRadius:2, cursor:"pointer", ...T.label, fontSize:10, color:form.remote===t?C.ink:C.muted }}>

              </button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>Culture -- in your own words</Lbl>
          <Textarea value={form.culture} onChange={e=>setForm(f=>({...f,culture:e.target.value}))} rows={4} placeholder="What makes your company a place where people want to stay?" />

// --- COMPANY DASHBOARD --------------------------------------------------------
function CompanyDashboard({ screen, setScreen, pipeline, setChatParty, setScheduleParty, setShowSchedule, planTier, onUpgrade }) {
  const stages = [
    { key:"new",        label:"New matches",    items:pipeline.filter(c=>c.status==="new") },
    { key:"interested", label:"In conversation", items:pipeline.filter(c=>c.status==="interested") },
    { key:"interview",  label:"Interview set",   items:pipeline.filter(c=>c.status==="interview") },
  ];

  return (
    <div style={{ paddingBottom:80, minHeight:"100vh", background:C.ground, maxWidth:390, margin:"0 auto" }}>
      {/* Header */}
      <div style={{ background:C.slate, padding:"52px 24px 28px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
          <div>
            <div style={{ ...T.label, fontSize:10, color:"rgba(255,255,255,.35)", marginBottom:6 }}>Hiring Dashboard</div>
            <div style={{ ...T.heading, fontSize:20, color:C.white }}>Pinnacle Mortgage</div>
          </div>
          <button onClick={()=>setScreen("pricing")} style={{ background:"transparent", border:"1px solid rgba(255,255,255,.2)", padding:"7px 12px", borderRadius:2, cursor:"pointer", ...T.label, fontSize:9, color:"rgba(255,255,255,.6)" }}>
            {planTier==="free"?"Free Plan ->":"Growth ->"}
          </button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:1, background:"rgba(255,255,255,.08)", borderRadius:1 }}>
          {[{l:"New",v:pipeline.filter(c=>c.status==="new").length},{l:"Talking",v:pipeline.filter(c=>c.status==="interested").length},{l:"Interview",v:pipeline.filter(c=>c.status==="interview").length}].map(s => (
            <div key={s.l} style={{ padding:"16px 12px", textAlign:"center" }}>
              <div style={{ ...T.display, fontSize:28, color:C.white }}>{s.v}</div>
              <div style={{ ...T.label, fontSize:9, color:"rgba(255,255,255,.4)", marginTop:3 }}>{s.l.toUpperCase()}</div>
            </div>
          ))}
        </div>
        {planTier==="free" && pipeline.filter(c=>c.status==="new").length > 0 && (
          <div onClick={()=>onUpgrade(null)} style={{ marginTop:16, padding:"12px 14px", borderLeft:`2px solid ${C.coral}`, cursor:"pointer" }}>
            <div style={{ ...T.body, fontSize:13, color:C.white }}>{pipeline.filter(c=>c.status==="new").length} candidates are interested. <span style={{ color:C.coral }}>Upgrade to connect {'->'}</span></div>
          </div>
        )}
      </div>

      {/* Pipeline */}
      <div style={{ padding:"0 24px" }}>
        {stages.map(stage => (
          <div key={stage.key} style={{ paddingTop:24, paddingBottom:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
              <div style={{ ...T.label, fontSize:10, color:C.muted }}>{stage.label.toUpperCase()}</div>
              <div style={{ ...T.label, fontSize:10, color:C.coral }}>{stage.items.length}</div>
            </div>
            {stage.items.length===0 ? (
              <div style={{ padding:"20px 0", borderTop:`1px solid ${C.rule}` }}>
                <div style={{ ...T.caption, fontSize:13, color:C.muted }}>No candidates here yet</div>
              </div>
            ) : stage.items.map(c => (
              <div key={c.id} style={{ paddingTop:16, paddingBottom:16, borderTop:`1px solid ${C.rule}` }}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:8 }}>
                  <div>
                    <div style={{ ...T.subhead, fontSize:15, color:C.ink, marginBottom:2 }}>{c.alias}</div>
                    <div style={{ ...T.caption, fontSize:12, color:C.muted }}>{c.role} . {c.exp} . {c.style}</div>
                  </div>
                  <div style={{ ...T.label, fontSize:9, color:STATUS_META[c.status].color, background:STATUS_META[c.status].bg, padding:"4px 9px", borderRadius:1, flexShrink:0, marginLeft:12 }}>
                    {STATUS_META[c.status].label.toUpperCase()}
                  </div>
                </div>
                <div style={{ ...T.caption, fontSize:12, color:C.muted, marginBottom:12 }}>{c.volume} . {c.comp} target</div>
                {planTier==="free" ? (
                  <button onClick={()=>onUpgrade(TIERS.find(t=>t.id==="growth"))} style={{ width:"100%", padding:"11px", background:"transparent", border:`1px solid ${C.coral}`, borderRadius:2, cursor:"pointer", ...T.label, fontSize:10, color:C.coral }}>
                    Upgrade to connect &#8594;
                  </button>
                ) : (
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={()=>setChatParty(c)} style={{ flex:1, padding:"10px", background:"transparent", border:`1px solid ${C.rule}`, borderRadius:2, cursor:"pointer", ...T.label, fontSize:10, color:C.ink }}>Chat</button>
                    <button onClick={()=>{setScheduleParty(c);setShowSchedule(true);}} style={{ flex:1, padding:"10px", background:C.coral, border:"none", borderRadius:2, cursor:"pointer", ...T.label, fontSize:10, color:C.white }}>Schedule</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        ))}
      </div>
      <CompanyNav screen={screen} setScreen={setScreen} hasNew={pipeline.some(c=>c.status==="new")} />
    </div>
  );
}

// --- ROOT ---------------------------------------------------------------------
function App() {
  const [screen,    setScreen]    = useState("home");
  const [role,      setRole]      = useState(null);
  const [anonMode,  setAnonMode]  = useState(true);
  const [cardIdx,   setCardIdx]   = useState(0);
  const [matches,   setMatches]   = useState([]);
  const [showMatch, setShowMatch] = useState(null);
  const [showResume,setShowResume]= useState(null);
  const [candIdx,   setCandIdx]   = useState(0);
  const [pipeline,  setPipeline]  = useState([
    { ...CANDIDATES[0], status:"interested" },
    { ...CANDIDATES[2], status:"interview"  },
  ]);
  const [chatParty,     setChatParty]     = useState(null);
  const [schedParty,    setSchedParty]    = useState(null);
  const [showSched,     setShowSched]     = useState(false);
  const [interviews,    setInterviews]    = useState([
    { id:"iv1", party:{ name:"Pinnacle Mortgage Group", type:"Independent Broker", logo:"P", gradient:"linear-gradient(145deg,#C04F39,#E0634A)" }, slot:"Mon Jun 30 . 9:00 AM", zoom:"https://zoom.us/j/123456789", confirmedAt:"2 days ago" },
  ]);
  const [planTier,      setPlanTier]      = useState("free");
  const [showCheckout,  setShowCheckout]  = useState(false);
  const [checkoutTier,  setCheckoutTier]  = useState(null);

  const deck = COMPANIES.slice(cardIdx);

  const seekerSwipe = dir => {
    const co = deck[0]; if(!co) return;
    if(dir==="right"){ setMatches(m=>[...m,co]); setShowMatch(co); }
    setCardIdx(i=>i+1);
  };

  const companySwipe = (dir,c) => {
    if(dir==="right"){
      if(planTier==="free"){ setPipeline(p=>[...p,{...c,status:"new"}]); setShowMatch(c); }
      else{ setPipeline(p=>[...p,{...c,status:"interested"}]); setShowMatch(c); }
    }
    setCandIdx(i=>i+1);
  };

  const handleSelectTier = tier => {
    if(!tier){ setScreen("pricing"); return; }
    setCheckoutTier(tier); setShowCheckout(true);
  };

  const handleCheckoutSuccess = tier => {
    setPlanTier(tier.id);
    setShowCheckout(false);
    if(role==="company") setScreen("co-dashboard");
  };

  if(chatParty) return (
    <div style={{maxWidth:390,margin:"0 auto"}}>
      <ChatScreen party={chatParty} onBack={()=>setChatParty(null)} onSchedule={p=>{setChatParty(null);setSchedParty(p);setShowSched(true);}} isCompany={role==="company"} />
    </div>
  );

  if(screen==="pricing") return (
    <div style={{maxWidth:390,margin:"0 auto",minHeight:"100vh"}}>
      <PricingPage onSelectTier={handleSelectTier} currentTier={planTier} onBack={()=>setScreen(role==="company"?"co-dashboard":"swipe")} />
      {showCheckout && checkoutTier && <CheckoutModal tier={checkoutTier} onSuccess={handleCheckoutSuccess} onClose={()=>setShowCheckout(false)} />}
    </div>
  );

  return (
    <div style={{maxWidth:390,margin:"0 auto",minHeight:"100vh",background:C.ground}}>
      {screen==="home"           && <HomeScreen setScreen={setScreen} setRole={setRole} />}
      {screen==="seeker-onboard" && <SeekerOnboard setScreen={setScreen} anonMode={anonMode} setAnonMode={setAnonMode} />}
      {screen==="company-onboard"&& <CompanyOnboard setScreen={setScreen} onSelectTier={tier=>{ handleSelectTier(tier); if(tier?.id==="free"){ setTimeout(()=>{setPlanTier("free");setScreen("co-dashboard");},1500); } }} />}

      {/* ??? SEEKER: DISCOVER ??? */}
      {screen==="swipe" && (
        <div style={{display:"flex",flexDirection:"column",paddingBottom:80,minHeight:"100vh",background:C.ground}}>
          <div style={{padding:"52px 24px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:18,height:18,background:C.coral,borderRadius:1}} />
              <div style={{...T.label,fontSize:12,color:C.ink,letterSpacing:"0.1em"}}>LOCKIN</div>
            </div>
            <div style={{...T.label,fontSize:9,color:anonMode?C.coral:C.muted}}>{anonMode?"Anon Mode":"Public"}</div>
          </div>
          <div style={{flex:1,position:"relative",margin:"0 20px",height:560}}>
            {deck.length===0 ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",textAlign:"center",padding:32}}>
                <div style={{...T.display,fontSize:32,color:C.ink,marginBottom:8,lineHeight:1}}>You've seen everyone.</div>
                <div style={{...T.body,fontSize:14,color:C.body,marginBottom:24}}>Check back when companies update their profiles.</div>
                <button onClick={()=>setScreen("matches")} style={{padding:"12px 24px",background:C.coral,color:C.white,border:"none",borderRadius:2,cursor:"pointer",...T.label,fontSize:11}}>See My Matches . {matches.length}</button>
              </div>
            ) : (
              deck.slice(0,2).reverse().map((co,i)=>(
                <CompanySwipeCard key={co.id+"-"+i} co={co} isTop={i===Math.min(deck.length,2)-1} onSwipe={seekerSwipe} />
              ))
            )}
          </div>
          {deck.length>0 && (
            <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:20,padding:"16px 0 8px"}}>
              <button onClick={()=>seekerSwipe("left")} style={{width:54,height:54,borderRadius:"50%",background:C.white,border:`1px solid ${C.rule}`,fontSize:18,cursor:"pointer",color:C.error}}>?</button>
              <button onClick={()=>seekerSwipe("right")} style={{width:64,height:64,borderRadius:"50%",background:C.coral,border:"none",fontSize:22,cursor:"pointer",color:C.white,boxShadow:"0 4px 20px rgba(217,95,59,.4)"}}>heart</button>
              <button style={{width:54,height:54,borderRadius:"50%",background:C.white,border:`1px solid ${C.rule}`,fontSize:18,cursor:"pointer",color:C.muted}}>star</button>
            </div>
          )}
          <SeekerNav screen={screen} setScreen={setScreen} matchCount={matches.length} />
          {showMatch && <MatchModal party={showMatch} isCompany={false} planTier={planTier} onUpgrade={handleSelectTier} onChat={p=>{setShowMatch(null);setChatParty(p);}} onSchedule={p=>{setShowMatch(null);setShowResume(p);}} onClose={()=>setShowMatch(null)} />}
          {showResume && (
            <div style={{position:"fixed",inset:0,background:"rgba(15,15,14,.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:110}}>
              <div style={{background:C.white,padding:"28px 24px 48px",width:"100%",maxWidth:390}}>
                <div style={{...T.label,fontSize:10,color:C.coral,marginBottom:12}}>Resume</div>
                <div style={{...T.display,fontSize:30,color:C.ink,marginBottom:8,lineHeight:1}}>Share your resume?</div>
                <p style={{...T.body,fontSize:14,color:C.body,lineHeight:1.6,marginBottom:28}}><strong>{showResume.name}</strong> would like to see your full resume. Sharing is always your choice.</p>
                <PrimaryBtn onClick={()=>{setShowResume(null);setSchedParty(showResume);setShowSched(true);}}>Share my resume</PrimaryBtn>
                <GhostBtn onClick={()=>{setShowResume(null);setSchedParty(showResume);setShowSched(true);}} style={{marginTop:10}}>Not yet</GhostBtn>
              </div>
            </div>
          )}
          {showSched && schedParty && <ScheduleModal party={schedParty} onClose={()=>{setShowSched(false);setSchedParty(null);}} onConfirmInterview={iv=>setInterviews(prev=>[{id:"iv-"+Date.now(),...iv},...prev])} />}
      {screen==="matches" && (
        <div style={{paddingBottom:80,minHeight:"100vh",background:C.ground}}>
          {/* Header */}
          <div style={{padding:"52px 24px 20px"}}>
            <div style={{...T.label,fontSize:10,color:C.coral,marginBottom:10}}>Matches</div>
            <div style={{...T.display,fontSize:36,color:C.ink,lineHeight:1,marginBottom:4}}>
              {matches.length > 0 ? `${matches.length} interested.` : "No matches yet."}
            </div>
            <div style={{...T.body,fontSize:14,color:C.body}}>
              {matches.length>0?"Companies interested in your profile.":"Keep discovering -- your next chapter is out there."}
            </div>
          </div>

          {/* ?? UPCOMING INTERVIEWS -- pinned section ?? */}
          {interviews.length > 0 && (
            <div>
              <div style={{padding:"0 24px 12px", borderBottom:`1px solid ${C.rule}`}}>
                <div style={{...T.label, fontSize:10, color:C.muted, marginBottom:14}}>Upcoming Interviews . {interviews.length}</div>
                {interviews.map((iv, i) => (
                  <div key={iv.id} style={{
                    background:C.slate, borderRadius:2, padding:"18px 20px",
                    marginBottom: i < interviews.length-1 ? 10 : 0,
                  }}>
                    {/* Date/time prominent */}
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12}}>
                      <div>
                        <div style={{...T.display, fontSize:22, color:C.white, lineHeight:1, marginBottom:4}}>{iv.slot}</div>
                        <div style={{...T.caption, fontSize:12, color:"rgba(255,255,255,.45)"}}>Confirmed {iv.confirmedAt}</div>
                      </div>
                      <div style={{...T.label, fontSize:9, color:C.teal, background:"rgba(30,127,116,.2)", padding:"4px 9px", borderRadius:1, flexShrink:0, marginLeft:12, border:`1px solid rgba(30,127,116,.3)`}}>

                    {/* Company */}
                    <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:14}}>

                        {iv.party.logo || iv.party.name?.[0]}

                      <div>
                        <div style={{...T.subhead, fontSize:14, color:C.white}}>{iv.party.name || iv.party.alias}</div>
                        <div style={{...T.caption, fontSize:11, color:"rgba(255,255,255,.45)"}}>{iv.party.type || iv.party.role}</div>

                    <div style={{display:"flex", gap:8}}>

                        Join Zoom &#8594;
                      </a>
                      <button style={{flex:1, padding:"10px", background:"rgba(255,255,255,.08)", border:"1px solid rgba(255,255,255,.12)", borderRadius:2, cursor:"pointer", ...T.label, fontSize:10, color:"rgba(255,255,255,.6)"}}>
                        Reschedule
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ?? MATCHES LIST ?? */}
          {matches.length > 0 && (
            <div style={{padding:"20px 24px 0"}}>
              <div style={{...T.label, fontSize:10, color:C.muted, marginBottom:0}}>All Matches . {matches.length}</div>
            </div>
          )}
          <div style={{padding:"0 24px"}}>
            {matches.length === 0 ? (
              <div style={{padding:"40px 0", textAlign:"center"}}>
                <div style={{...T.body, fontSize:14, color:C.muted}}>Keep discovering -- your next chapter is out there.</div>
              </div>

              <div key={co.id} style={{paddingTop:20,paddingBottom:20,borderBottom:`1px solid ${C.rule}`}}>

                  <div>
                    <div style={{...T.subhead,fontSize:16,color:C.ink,marginBottom:3}}>{co.name}</div>
                    <div style={{...T.caption,fontSize:12,color:C.muted}}>{co.type} . {co.remote}</div>

                  <div style={{...T.label,fontSize:9,color:C.coral,background:C.coralSoft,padding:"4px 9px",borderRadius:1,flexShrink:0,marginLeft:12}}>Matched</div>
                </div>
                <p style={{...T.body,fontSize:13,color:C.body,fontStyle:"italic",marginBottom:14,lineHeight:1.5}}>"{co.topReview}"</p>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setChatParty(co)} style={{flex:1,padding:"10px",background:"transparent",border:`1px solid ${C.rule}`,borderRadius:2,cursor:"pointer",...T.label,fontSize:10,color:C.ink}}>Chat</button>
                  <button onClick={()=>{setSchedParty(co);setShowSched(true);}} style={{flex:1,padding:"10px",background:C.coral,border:"none",borderRadius:2,cursor:"pointer",...T.label,fontSize:10,color:C.white}}>Schedule</button>

              </div>

          )}
        </div>
      )}

      {/* ??? SEEKER: PROFILE ??? */}
      {screen==="profile" && (
        <div style={{paddingBottom:80,minHeight:"100vh",background:C.ground}}>
          <div style={{background:C.slate,padding:"52px 24px 28px"}}>
            <div style={{...T.label,fontSize:10,color:"rgba(255,255,255,.35)",marginBottom:10}}>Profile</div>
            <div style={{...T.display,fontSize:34,color:C.white,lineHeight:1,marginBottom:12}}>{anonMode?"Senior LO, Midwest":"Jordan Rivera"}</div>
            <div style={{...T.caption,fontSize:13,color:"rgba(255,255,255,.5)"}}>{anonMode?"NMLS # hidden . Licensed in multiple states":"NMLS #1847302 . IL, WI, IN, MN"}</div>
          </div>
          <div style={{padding:"0 24px"}}>
            {/* Anon toggle */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 0",borderBottom:`1px solid ${C.rule}`}}>
              <div>
                <div style={{...T.subhead,fontSize:14,color:C.ink,marginBottom:3}}>{anonMode?"Anonymity Mode -- On":"Public Profile"}</div>
                <div style={{...T.caption,fontSize:12,color:C.muted}}>{anonMode?"Name and employer hidden":"Full profile visible"}</div>
              </div>
              <button onClick={()=>setAnonMode(a=>!a)} style={{padding:"8px 14px",background:anonMode?C.coral:"transparent",border:`1px solid ${anonMode?C.coral:C.rule}`,borderRadius:2,cursor:"pointer",...T.label,fontSize:10,color:anonMode?C.white:C.muted}}>
                {anonMode?"On":"Off"}
              </button>
            </div>
            {[["Role","Senior Loan Officer"],["Experience","7 years"],["Monthly Volume","$3.2M"],["Comp Target","75%+ split"],["Work Style","Remote preferred"]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0",borderBottom:`1px solid ${C.rule}`}}>
                <div style={{...T.label,fontSize:10,color:C.muted}}>{l.toUpperCase()}</div>
                <div style={{...T.subhead,fontSize:14,color:C.ink}}>{v}</div>
              </div>
            ))}
            <div style={{paddingTop:20}}>
              <Lbl>Reviews</Lbl>
              <Stars rating={4.9} count={58} source="Google" />
              <div style={{height:8}} />
              <Stars rating={4.7} count={34} source="Experience.com" />
            </div>
          </div>
          <SeekerNav screen={screen} setScreen={setScreen} matchCount={matches.length} />
        </div>
      )}

      {/* ??? COMMUNITY ??? */}
      {screen==="community" && (
        <CommunityScreen screen={screen} setScreen={setScreen} matchCount={matches.length} />
      )}

      {/* ??? COMPANY: BROWSE ??? */}
      {screen==="co-browse" && (
        <div style={{display:"flex",flexDirection:"column",paddingBottom:80,minHeight:"100vh",background:C.ground}}>
          <div style={{padding:"52px 24px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{...T.heading,fontSize:18,color:C.ink}}>Candidates</div>
            <div style={{...T.label,fontSize:9,color:C.muted}}>{CANDIDATES.slice(candIdx).length} remaining</div>
          </div>
          <div style={{flex:1,position:"relative",margin:"0 20px",height:570}}>
            {CANDIDATES.slice(candIdx).length===0 ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",textAlign:"center",padding:32}}>
                <div style={{...T.display,fontSize:30,color:C.ink,marginBottom:8,lineHeight:1}}>You've seen everyone.</div>
                <button onClick={()=>setScreen("co-dashboard")} style={{padding:"12px 24px",background:C.coral,color:C.white,border:"none",borderRadius:2,cursor:"pointer",...T.label,fontSize:11}}>Go to Dashboard</button>
              </div>
            ):(
              CANDIDATES.slice(candIdx,candIdx+2).reverse().map((c,i)=>(
                <CandidateSwipeCard key={c.id+"-"+i} candidate={c} isTop={i===Math.min(CANDIDATES.slice(candIdx).length,2)-1} onSwipe={companySwipe} />
              ))
            )}
          </div>
          {CANDIDATES.slice(candIdx).length>0 && (
            <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:20,padding:"16px 0 8px"}}>
              <button onClick={()=>companySwipe("left",CANDIDATES[candIdx])} style={{width:54,height:54,borderRadius:"50%",background:C.white,border:`1px solid ${C.rule}`,fontSize:18,cursor:"pointer",color:C.error}}>?</button>
              <button onClick={()=>companySwipe("right",CANDIDATES[candIdx])} style={{width:64,height:64,borderRadius:"50%",background:C.coral,border:"none",fontSize:22,cursor:"pointer",color:C.white,boxShadow:"0 4px 20px rgba(217,95,59,.4)"}}>heart</button>
              <button style={{width:54,height:54,borderRadius:"50%",background:C.white,border:`1px solid ${C.rule}`,fontSize:18,cursor:"pointer",color:C.muted}}>star</button>
            </div>
          )}
          <CompanyNav screen={screen} setScreen={setScreen} hasNew={pipeline.some(c=>c.status==="new")} />
          {showMatch && <MatchModal party={showMatch} isCompany planTier={planTier} onUpgrade={handleSelectTier} onChat={p=>{setShowMatch(null);setChatParty(p);}} onSchedule={p=>{setShowMatch(null);setSchedParty(p);setShowSched(true);}} onClose={()=>setShowMatch(null)} />}
          {showSched && schedParty && <ScheduleModal party={schedParty} onClose={()=>{setShowSched(false);setSchedParty(null);}} onConfirmInterview={iv=>setInterviews(prev=>[{id:"iv-"+Date.now(),...iv},...prev])} />}
        </div>
      )}

      {/* ??? COMPANY: DASHBOARD ??? */}
      {screen==="co-dashboard" && (
        <CompanyDashboard screen={screen} setScreen={setScreen} pipeline={pipeline} setChatParty={setChatParty} setScheduleParty={setSchedParty} setShowSchedule={setShowSched} planTier={planTier} onUpgrade={handleSelectTier} />
      )}

      {/* ??? COMPANY: PROFILE ??? */}
      {screen==="co-profile" && (
        <div style={{paddingBottom:80,minHeight:"100vh",background:C.ground}}>
          <div style={{background:C.slate,padding:"52px 24px 28px"}}>
            <div style={{...T.label,fontSize:10,color:"rgba(255,255,255,.35)",marginBottom:10}}>Company</div>
            <div style={{...T.display,fontSize:34,color:C.white,lineHeight:1,marginBottom:8}}>Pinnacle Mortgage</div>
            <div style={{...T.caption,fontSize:13,color:"rgba(255,255,255,.45)"}}>Independent Broker . Verified</div>
            <div onClick={()=>setScreen("pricing")} style={{marginTop:16,padding:"10px 14px",border:"1px solid rgba(255,255,255,.15)",borderRadius:2,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{...T.body,fontSize:13,color:"rgba(255,255,255,.6)"}}>{planTier==="free"?"Free Plan -- Upgrade to connect":"Growth Plan -- $9.99/mo"}</div>
              <div style={{...T.label,fontSize:10,color:C.coral}}>Manage {'->'}</div>
            </div>
          </div>
          <div style={{padding:"0 24px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,background:C.rule,marginBottom:1}}>
              {[{l:"Views",v:"847"},{l:"Matches",v:pipeline.length},{l:"Interviews",v:pipeline.filter(c=>c.status==="interview").length},{l:"Roles",v:"3"}].map(s=>(
                <div key={s.l} style={{padding:"20px 16px",background:C.ground}}>
                  <div style={{...T.display,fontSize:28,color:C.ink,marginBottom:4}}>{s.v}</div>
                  <div style={{...T.label,fontSize:9,color:C.muted}}>{s.l.toUpperCase()}</div>
                </div>
              ))}
            </div>
            <div style={{paddingTop:20}}>
              <Lbl>Currently Hiring</Lbl>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {["Loan Officers","Processors","LOAs"].map(r=>(
                  <div key={r} style={{border:`1px solid ${C.rule}`,padding:"6px 12px",borderRadius:2,...T.label,fontSize:9,color:C.body}}>{r.toUpperCase()}</div>
                ))}
              </div>
            </div>
            <div style={{paddingTop:24,paddingBottom:20,borderTop:`1px solid ${C.rule}`,marginTop:20}}>
              <Lbl>Reviews</Lbl>
              <Stars rating={4.8} count={112} source="Google" />
              <div style={{height:8}} />
              <Stars rating={4.7} count={89}  source="Experience.com" />
            </div>
            <GhostBtn>Edit company profile</GhostBtn>
          </div>
          <CompanyNav screen={screen} setScreen={setScreen} hasNew={false} />
        </div>
      )}

      {/* Global modals */}
      {showCheckout && checkoutTier && <CheckoutModal tier={checkoutTier} onSuccess={handleCheckoutSuccess} onClose={()=>setShowCheckout(false)} />}
      {showSched && schedParty && !["swipe","co-browse","matches"].includes(screen) && <ScheduleModal party={schedParty} onClose={()=>{setShowSched(false);setSchedParty(null);}} onConfirmInterview={iv=>setInterviews(prev=>[{id:"iv-"+Date.now(),...iv},...prev])} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
