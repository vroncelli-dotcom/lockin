  const down = x => {setDragging(true);startX.current=x;};
  const move = x => {if(dragging)setDragX(x-startX.current);};
  const up = () => {
    if(!dragging)return;setDragging(false);
    if(dragX>80)onSwipe("right");else if(dragX<-80)onSwipe("left");else setDragX(0);
  };
  return html`<div
    onMouseDown=${e=>down(e.clientX)} onMouseMove=${e=>move(e.clientX)} onMouseUp=${up} onMouseLeave=${up}

  const stages = [
    {key:"new",label:"New matches",items:pipeline.filter(c=>c.status==="new")},
    {key:"interested",label:"In conversation",items:pipeline.filter(c=>c.status==="interested")},
    {key:"interview",label:"Interview set",items:pipeline.filter(c=>c.status==="interview")},
  ];
  return html`<div style=${{paddingBottom:80,minHeight:"100vh",background:C.ground,maxWidth:390,margin:"0 auto"}}>
    <div style=${{background:C.slate,padding:"52px 24px 28px"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
        <div>
          <div style=${{...T.label,fontSize:10,color:"rgba(255,255,255,.35)",marginBottom:6}}>Hiring Dashboard</div>
          <div style=${{...T.heading,fontSize:20,color:C.white}}>Pinnacle Mortgage</div>
        </div>
        <button onClick=${()=>setScreen("pricing")} style=${{background:"transparent",border:"1px solid rgba(255,255,255,.2)",padding:"7px 12px",borderRadius:2,...T.label,fontSize:9,color:"rgba(255,255,255,.6)"}}>
          ${planTier==="free"?"Free Plan":"Growth Plan"}
        </button>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:"rgba(255,255,255,.08)"}}>
        ${[{l:"New",v:pipeline.filter(c=>c.status==="new").length},{l:"Talking",v:pipeline.filter(c=>c.status==="interested").length},{l:"Interview",v:pipeline.filter(c=>c.status==="interview").length}].map(s=>html`
          <div key=${s.l} style=${{padding:"16px 12px",textAlign:"center"}}>
            <div style=${{...T.display,fontSize:28,color:C.white}}>${s.v}</div>
            <div style=${{...T.label,fontSize:9,color:"rgba(255,255,255,.4)",marginTop:3}}>${s.l.toUpperCase()}</div>
          </div>

      </div>
      ${planTier==="free"&&pipeline.filter(c=>c.status==="new").length>0?html`
        <div onClick=${()=>onUpgrade()} style=${{marginTop:16,padding:"12px 14px",borderLeft:"2px solid "+C.coral,cursor:"pointer"}}>
          <div style=${{...T.body,fontSize:13,color:C.white}}>${pipeline.filter(c=>c.status==="new").length} candidates are interested. <span style=${{color:C.coral}}>Upgrade to connect &#8594;</span></div>
        </div>
      `:""}
    </div>
    <div style=${{padding:"0 24px"}}>
      ${stages.map(stage=>html`
        <div key=${stage.key} style=${{paddingTop:24,paddingBottom:8}}>
          <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style=${{...T.label,fontSize:10,color:C.muted}}>${stage.label.toUpperCase()}</div>
            <div style=${{...T.label,fontSize:10,color:C.coral}}>${stage.items.length}</div>
          </div>
          ${stage.items.length===0?html`
            <div style=${{padding:"20px 0",borderTop:"1px solid "+C.rule}}>
              <div style=${{...T.caption,fontSize:13,color:C.muted}}>No candidates here yet</div>
            </div>
          `:stage.items.map(c=>html`
            <div key=${c.id} style=${{paddingTop:16,paddingBottom:16,borderTop:"1px solid "+C.rule}}>
              <div style=${{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8}}>
                <div>
                  <div style=${{...T.subhead,fontSize:15,color:C.ink,marginBottom:2}}>${c.alias}</div>
                  <div style=${{...T.caption,fontSize:12,color:C.muted}}>${c.role} - ${c.exp} - ${c.style}</div>
                </div>
                <div style=${{...T.label,fontSize:9,color:c.status==="interview"?C.teal:c.status==="interested"?C.coral:C.muted,background:c.status==="interview"?C.tealSoft:c.status==="interested"?C.coralSoft:C.groundAlt,padding:"4px 9px",borderRadius:1,flexShrink:0,marginLeft:12}}>${c.status.toUpperCase()}</div>
              </div>
              <div style=${{...T.caption,fontSize:12,color:C.muted,marginBottom:12}}>${c.volume} - ${c.comp} target</div>
              ${planTier==="free"?html`
                <button onClick=${()=>onUpgrade()} style=${{width:"100%",padding:"11px",background:"transparent",border:"1px solid "+C.coral,borderRadius:2,...T.label,fontSize:10,color:C.coral}}>Upgrade to connect &#8594;</button>
              `:html`
                <div style=${{display:"flex",gap:8}}>
                  <button onClick=${()=>setChatParty(c)} style=${{flex:1,padding:"10px",background:"transparent",border:"1px solid "+C.rule,borderRadius:2,...T.label,fontSize:10,color:C.ink}}>Chat</button>

              `}
            </div>
          `)}
        </div>
      `)}
    </div>
    <${CompanyNav} screen=${screen} setScreen=${setScreen}/>
  </div>`;
}

// ROOT APP

  const [cardIdx,setCardIdx] = useState(0);
  const [matches,setMatches] = useState([]);
  const [showMatch,setShowMatch] = useState(null);
  const [interviews,setInterviews] = useState([{id:"iv1",party:{name:"Pinnacle Mortgage",type:"Independent Broker"},slot:"Mon Jun 30 - 9:00 AM",zoom:"https://zoom.us/j/123456789",confirmedAt:"2 days ago"}]);
  const [candIdx,setCandIdx] = useState(0);
  const [pipeline,setPipeline] = useState([{...CANDIDATES[0],status:"interested"},{...CANDIDATES[2],status:"interview"}]);
  const [chatParty,setChatParty] = useState(null);
  const [schedParty,setSchedParty] = useState(null);
  const [showSched,setShowSched] = useState(false);
  const [planTier,setPlanTier] = useState("free");
  const deck = COMPANIES.slice(cardIdx);

  const seekerSwipe = dir => {
    const co = deck[0];if(!co)return;
    if(dir==="right"){setMatches(m=>[...m,co]);setShowMatch(co);}
    setCardIdx(i=>i+1);

  const companySwipe = (dir,c) => {
    if(dir==="right"){
      if(planTier==="free"){setPipeline(p=>[...p,{...c,status:"new"}]);setShowMatch(c);}
      else{setPipeline(p=>[...p,{...c,status:"interested"}]);setShowMatch(c);}

  const upgrade = () => setScreen("pricing");

  if(screen==="pricing")return html`<div style=${{maxWidth:390,margin:"0 auto",minHeight:"100vh"}}><${PricingPage} onSelect=${selectTier} currentTier=${planTier} onBack=${()=>setScreen(role==="company"?"co-dashboard":"swipe")}/></div>`;

        ${showSched&&schedParty?html`<${ScheduleModal} party=${schedParty} onClose=${()=>{setShowSched(false);setSchedParty(null);}} onConfirm=${iv=>setInterviews(prev=>[{id:"iv-"+Date.now(),...iv},...prev])}/>`:""}

                  <button style=${{flex:1,padding:"10px",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",borderRadius:2,...T.label,fontSize:10,color:"rgba(255,255,255,.6)"}}>Reschedule</button>

        `:""}
        <${CompanyNav} screen=${screen} setScreen=${setScreen}/>
        ${showMatch?html`<${MatchModal} party=${showMatch} isCompany=${true} planTier=${planTier} onUpgrade=${upgrade} onChat=${p=>{setShowMatch(null);setChatParty(p);}} onSchedule=${p=>{setShowMatch(null);setSchedParty(p);setShowSched(true);}} onClose=${()=>setShowMatch(null)}/>`:""}
        ${showSched&&schedParty?html`<${ScheduleModal} party=${schedParty} onClose=${()=>{setShowSched(false);setSchedParty(null);}} onConfirm=${iv=>setInterviews(prev=>[{id:"iv-"+Date.now(),...iv},...prev])}/>`:""}
      </div>
    `:""}

    ${screen==="co-dashboard"?html`<${CompanyDashboard} screen=${screen} setScreen=${setScreen} pipeline=${pipeline} setChatParty=${setChatParty} setSchedParty=${setSchedParty} setShowSched=${setShowSched} planTier=${planTier} onUpgrade=${upgrade}/>`:""}

    ${screen==="co-profile"?html`
      <div style=${{paddingBottom:80,minHeight:"100vh",background:C.ground}}>
        <div style=${{background:C.slate,padding:"52px 24px 28px"}}>
          <div style=${{...T.label,fontSize:10,color:"rgba(255,255,255,.35)",marginBottom:10}}>Company</div>
          <div style=${{...T.display,fontSize:34,color:C.white,lineHeight:1,marginBottom:8}}>Pinnacle Mortgage</div>
          <div style=${{...T.caption,fontSize:13,color:"rgba(255,255,255,.45)"}}>Independent Broker - Verified</div>
          <div onClick=${()=>setScreen("pricing")} style=${{marginTop:16,padding:"10px 14px",border:"1px solid rgba(255,255,255,.15)",borderRadius:2,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style=${{...T.body,fontSize:13,color:"rgba(255,255,255,.6)"}}>${planTier==="free"?"Free Plan - Upgrade to connect":"Growth Plan - $9.99/mo"}</div>
            <div style=${{...T.label,fontSize:10,color:C.coral}}>Manage &#8594;</div>
          </div>
        </div>
        <div style=${{padding:"0 24px"}}>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,background:C.rule,marginBottom:1}}>
            ${[{l:"Views",v:"847"},{l:"Matches",v:pipeline.length},{l:"Interviews",v:pipeline.filter(c=>c.status==="interview").length},{l:"Roles",v:"3"}].map(s=>html`
              <div key=${s.l} style=${{padding:"20px 16px",background:C.ground}}>
                <div style=${{...T.display,fontSize:28,color:C.ink,marginBottom:4}}>${s.v}</div>
                <div style=${{...T.label,fontSize:9,color:C.muted}}>${s.l.toUpperCase()}</div>
              </div>
            `)}
          </div>
        </div>
        <${CompanyNav} screen=${screen} setScreen=${setScreen}/>
      </div>
    `:""}

    ${showSched&&schedParty&&!["swipe","co-browse","matches"].includes(screen)?html`<${ScheduleModal} party=${schedParty} onClose=${()=>{setShowSched(false);setSchedParty(null);}} onConfirm=${iv=>setInterviews(prev=>[{id:"iv-"+Date.now(),...iv},...prev])}/>`:""}
  </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
